<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ortodonti (Diş Teli) Animasyonu</title>
<style>
  html,body{margin:0;height:100%;background:transparent;font-family:'Poppins','Segoe UI',sans-serif;}
  .sahne{max-width:760px;margin:0 auto;}
  .t1,.t2,.t3,.t4,.t5{transform-box:fill-box;transform-origin:center bottom}
  .t1{animation:a1 14s infinite ease-in-out}.t2{animation:a2 14s infinite ease-in-out}
  .t3{animation:a3 14s infinite ease-in-out}.t4{animation:a4 14s infinite ease-in-out}.t5{animation:a5 14s infinite ease-in-out}
  .braces{animation:brc 14s infinite linear}
  .spark{animation:spk 14s infinite linear}
  .pbar{transform-box:fill-box;transform-origin:left center;animation:pgA 14s infinite linear}
  .l1{animation:l1 14s infinite linear}.l2{animation:l2 14s infinite linear}
  .l3{animation:l3 14s infinite linear}.l4{animation:l4 14s infinite linear}
  @keyframes a1{0%,30%{transform:rotate(-15deg)}78%,100%{transform:rotate(0)}}
  @keyframes a2{0%,30%{transform:rotate(11deg)}78%,100%{transform:rotate(0)}}
  @keyframes a3{0%,30%{transform:rotate(-9deg)}78%,100%{transform:rotate(0)}}
  @keyframes a4{0%,30%{transform:rotate(13deg)}78%,100%{transform:rotate(0)}}
  @keyframes a5{0%,30%{transform:rotate(-6deg)}78%,100%{transform:rotate(0)}}
  @keyframes brc{0%,22%{opacity:0}30%,100%{opacity:1}}
  @keyframes spk{0%,82%{opacity:0}88%{opacity:1}94%{opacity:0.3}100%{opacity:1}}
  @keyframes pgA{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
  @keyframes l1{0%,18%{opacity:1}22%,100%{opacity:0}}
  @keyframes l2{0%,20%{opacity:0}24%,38%{opacity:1}42%,100%{opacity:0}}
  @keyframes l3{0%,40%{opacity:0}44%,78%{opacity:1}82%,100%{opacity:0}}
  @keyframes l4{0%,80%{opacity:0}84%,100%{opacity:1}}
  .lbl{font-family:'Poppins','Segoe UI',sans-serif;font-size:18px;font-weight:600;fill:#4e403b}
  @media (prefers-reduced-motion: reduce){
    .t1,.t2,.t3,.t4,.t5{animation:none;transform:rotate(0)!important}
    .braces{animation:none;opacity:1}.l1,.l2,.l3,.pbar,.spark{animation:none}
    .l1,.l2,.l3{opacity:0}.l4{animation:none;opacity:1}.spark{opacity:1}
  }
</style>
</head>
<body>
<div class="sahne">
<svg width="100%" viewBox="0 0 760 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Ortodonti diş teli tedavi animasyonu</title>
<desc>Çapraşık dişlere braket ve tel takılıp dişlerin hizalanmasını gösteren animasyon.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fdf4ec"/><stop offset="1" stop-color="#f8ddc6"/></linearGradient>
<radialGradient id="enamel" cx="38%" cy="28%" r="80%"><stop offset="0" stop-color="#ffffff"/><stop offset="55%" stop-color="#f2f7fa"/><stop offset="100%" stop-color="#d6e1e8"/></radialGradient>
<linearGradient id="gum" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3afbc"/><stop offset="100%" stop-color="#d76f81"/></linearGradient>
<linearGradient id="bone" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8eed6"/><stop offset="100%" stop-color="#e6d2a6"/></linearGradient>
<linearGradient id="root" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3ead7"/><stop offset="100%" stop-color="#e0cfac"/></linearGradient>
<linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b939b"/><stop offset="30%" stop-color="#eef2f5"/><stop offset="65%" stop-color="#b3bbc2"/><stop offset="100%" stop-color="#7c848c"/></linearGradient>
<filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#4e403b" flood-opacity="0.18"/></filter>
<g id="cr">
<path d="M-32,-86 C-38,-100 -19,-104 0,-104 C19,-104 38,-100 32,-86 C37,-52 30,-22 23,-12 C11,-2 -11,-2 -23,-12 C-30,-22 -37,-52 -32,-86 Z" fill="url(#enamel)" stroke="#cdd9e0" stroke-width="1.5"/>
<path d="M-15,-8 L15,-8 L12,14 C6,22 -6,22 -12,14 Z" fill="url(#root)" stroke="#d8c9a8" stroke-width="1"/>
<ellipse cx="-11" cy="-74" rx="8" ry="18" fill="#ffffff" opacity="0.55"/>
</g>
<g id="brk">
<rect x="-9" y="-60" width="18" height="16" rx="3" fill="url(#chrome)" stroke="#7d868e" stroke-width="1"/>
<rect x="-9" y="-53" width="18" height="3.5" fill="#5f676e"/>
</g>
</defs>

<rect x="0" y="0" width="760" height="520" rx="20" fill="url(#bg)"/>
<path d="M40,60 C40,30 720,30 720,60 L720,150 C500,118 260,118 40,150 Z" fill="#f6dcc6" opacity="0.7"/>
<rect x="64" y="255" width="632" height="200" rx="18" fill="url(#bone)" stroke="#dcc89c" stroke-width="1.5"/>
<rect x="64" y="214" width="632" height="74" rx="16" fill="url(#gum)"/>
<rect x="74" y="220" width="612" height="12" rx="6" fill="#ffc2cd" opacity="0.7"/>

<line class="braces" x1="176" y1="167" x2="584" y2="167" stroke="#aab1b8" stroke-width="4" stroke-linecap="round"/>

<g transform="translate(200,218)"><g class="t1" filter="url(#soft)"><use href="#cr"/><g class="braces"><use href="#brk"/></g></g></g>
<g transform="translate(290,218)"><g class="t2" filter="url(#soft)"><use href="#cr"/><g class="braces"><use href="#brk"/></g></g></g>
<g transform="translate(380,218)"><g class="t3" filter="url(#soft)"><use href="#cr"/><g class="braces"><use href="#brk"/></g></g></g>
<g transform="translate(470,218)"><g class="t4" filter="url(#soft)"><use href="#cr"/><g class="braces"><use href="#brk"/></g></g></g>
<g transform="translate(560,218)"><g class="t5" filter="url(#soft)"><use href="#cr"/><g class="braces"><use href="#brk"/></g></g></g>

<g class="spark" fill="#f5a623">
<path d="M150,120 l4,10 l10,4 l-10,4 l-4,10 l-4,-10 l-10,-4 l10,-4 z"/>
<path d="M610,135 l3,8 l8,3 l-8,3 l-3,8 l-3,-8 l-8,-3 l8,-3 z"/>
<path d="M380,95 l3,8 l8,3 l-8,3 l-3,8 l-3,-8 l-8,-3 l8,-3 z"/>
</g>

<text class="lbl l1" x="380" y="492" text-anchor="middle">1. Çapraşık dişler</text>
<text class="lbl l2" x="380" y="492" text-anchor="middle">2. Braket ve tel takılır</text>
<text class="lbl l3" x="380" y="492" text-anchor="middle">3. Dişler hizalanıyor</text>
<text class="lbl l4" x="380" y="492" text-anchor="middle" fill="#0f6e56">✓ Düzgün, sağlıklı gülüş</text>

<rect x="60" y="504" width="640" height="6" rx="3" fill="#f1e1d2"/>
<rect class="pbar" x="60" y="504" width="640" height="6" rx="3" fill="#d17f79"/>
</svg>
</div>
</body>
</html>
