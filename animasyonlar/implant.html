<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İmplant Tedavisi Animasyonu</title>
<style>
  html,body{margin:0;height:100%;background:transparent;font-family:'Poppins','Segoe UI',sans-serif;}
  .sahne{max-width:760px;margin:0 auto;}
  .screw{animation:scrA 16s infinite ease-in-out}
  .crown{animation:crA 16s infinite ease-in-out}
  .abut{animation:abA 16s infinite linear}
  .gap{animation:gpA 16s infinite linear}
  .pbar{transform-box:fill-box;transform-origin:left center;animation:pgA 16s infinite linear}
  .l1{animation:l1 16s infinite linear}.l2{animation:l2 16s infinite linear}
  .l3{animation:l3 16s infinite linear}.l4{animation:l4 16s infinite linear}.l5{animation:l5 16s infinite linear}
  @keyframes scrA{0%,17%{opacity:0;transform:translateY(-300px)}18%{opacity:1;transform:translateY(-300px)}38%,100%{opacity:1;transform:translateY(0)}}
  @keyframes crA{0%,60%{opacity:0;transform:translateY(-340px)}61%{opacity:1;transform:translateY(-340px)}80%,100%{opacity:1;transform:translateY(0)}}
  @keyframes abA{0%,40%{opacity:0}50%,100%{opacity:1}}
  @keyframes gpA{0%,16%{opacity:1}20%,100%{opacity:0}}
  @keyframes pgA{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
  @keyframes l1{0%,16%{opacity:1}19%,100%{opacity:0}}
  @keyframes l2{0%,18%{opacity:0}21%,38%{opacity:1}41%,100%{opacity:0}}
  @keyframes l3{0%,40%{opacity:0}43%,58%{opacity:1}61%,100%{opacity:0}}
  @keyframes l4{0%,60%{opacity:0}63%,80%{opacity:1}83%,100%{opacity:0}}
  @keyframes l5{0%,82%{opacity:0}85%,100%{opacity:1}}
  .lbl{font-family:'Poppins','Segoe UI',sans-serif;font-size:18px;font-weight:600;fill:#173043}
  @media (prefers-reduced-motion: reduce){
    .screw,.crown,.abut,.gap,.pbar,.l1,.l2,.l3,.l4{animation:none}
    .screw,.crown,.abut{opacity:1!important;transform:none!important}.gap{opacity:0}.l5{opacity:1}
  }
</style>
</head>
<body>
<div class="sahne">
<svg width="100%" viewBox="0 0 760 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Diş implantı tedavi animasyonu</title>
<desc>Eksik dişin yerine implant vidası, dayanak ve kuron yerleştirilmesini gösteren dört aşamalı animasyon.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef8fd"/><stop offset="1" stop-color="#d8edf7"/></linearGradient>
<radialGradient id="enamel" cx="38%" cy="28%" r="80%"><stop offset="0" stop-color="#ffffff"/><stop offset="55%" stop-color="#f2f7fa"/><stop offset="100%" stop-color="#d6e1e8"/></radialGradient>
<linearGradient id="gum" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3afbc"/><stop offset="100%" stop-color="#d76f81"/></linearGradient>
<linearGradient id="bone" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8eed6"/><stop offset="100%" stop-color="#e6d2a6"/></linearGradient>
<linearGradient id="root" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f3ead7"/><stop offset="100%" stop-color="#e0cfac"/></linearGradient>
<linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8b939b"/><stop offset="22%" stop-color="#e8edf1"/><stop offset="50%" stop-color="#b3bbc2"/><stop offset="78%" stop-color="#eef2f5"/><stop offset="100%" stop-color="#7c848c"/></linearGradient>
<filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#173043" flood-opacity="0.20"/></filter>
<g id="tooth">
<path d="M-34,-90 C-40,-104 -20,-108 0,-108 C20,-108 40,-104 34,-90 C39,-54 32,-22 24,-12 C12,-2 -12,-2 -24,-12 C-32,-22 -39,-54 -34,-90 Z" fill="url(#enamel)" stroke="#cdd9e0" stroke-width="1.5"/>
<path d="M-20,-12 C-24,28 -28,56 -21,80 C-17,58 -9,18 -5,-10 Z" fill="url(#root)" stroke="#d8c9a8" stroke-width="1"/>
<path d="M20,-12 C24,28 28,56 21,80 C17,58 9,18 5,-10 Z" fill="url(#root)" stroke="#d8c9a8" stroke-width="1"/>
<ellipse cx="-12" cy="-78" rx="9" ry="20" fill="#ffffff" opacity="0.55"/>
</g>
<g id="crownShape">
<path d="M-34,-90 C-40,-104 -20,-108 0,-108 C20,-108 40,-104 34,-90 C39,-54 32,-22 24,-12 C12,-2 -12,-2 -24,-12 C-32,-22 -39,-54 -34,-90 Z" fill="url(#enamel)" stroke="#cdd9e0" stroke-width="1.5"/>
<path d="M-16,-8 L16,-8 L13,16 C6,24 -6,24 -13,16 Z" fill="url(#root)" stroke="#d8c9a8" stroke-width="1"/>
<ellipse cx="-12" cy="-78" rx="9" ry="20" fill="#ffffff" opacity="0.6"/>
</g>
<g id="screwShape">
<path d="M-19,-4 L19,-4 L13,150 C7,162 -7,162 -13,150 Z" fill="url(#chrome)" stroke="#6f777e" stroke-width="1.5"/>
<path d="M-16,16 L0,24 L16,16 M-16,40 L0,48 L16,40 M-15,64 L0,72 L15,64 M-13,88 L0,96 L13,88 M-11,112 L0,120 L11,112 M-9,136 L0,144 L9,136" fill="none" stroke="#6f777e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="-6" y="2" width="4" height="148" rx="2" fill="#ffffff" opacity="0.5"/>
</g>
<g id="abutShape">
<rect x="-5" y="-34" width="10" height="18" rx="2" fill="url(#chrome)" stroke="#7d868e" stroke-width="1"/>
<path d="M-13,-18 L13,-18 L9,6 L-9,6 Z" fill="url(#chrome)" stroke="#7d868e" stroke-width="1"/>
</g>
</defs>

<rect x="0" y="0" width="760" height="520" rx="20" fill="url(#bg)"/>
<path d="M40,60 C40,30 720,30 720,60 L720,150 C500,118 260,118 40,150 Z" fill="#cfe9f6" opacity="0.7"/>

<rect x="64" y="255" width="632" height="200" rx="18" fill="url(#bone)" stroke="#dcc89c" stroke-width="1.5"/>
<rect x="74" y="266" width="612" height="16" rx="8" fill="#fff7e6" opacity="0.6"/>

<use href="#tooth" transform="translate(205,218)" filter="url(#soft)"/>
<use href="#tooth" transform="translate(555,218)" filter="url(#soft)"/>

<g transform="translate(380,218)"><g class="screw" filter="url(#soft)"><use href="#screwShape"/></g></g>

<rect x="64" y="214" width="632" height="74" rx="16" fill="url(#gum)"/>
<rect x="74" y="220" width="612" height="12" rx="6" fill="#ffc2cd" opacity="0.7"/>

<g transform="translate(380,218)"><g class="abut"><use href="#abutShape"/></g></g>
<g transform="translate(380,218)"><g class="crown" filter="url(#soft)"><use href="#crownShape"/></g></g>

<g transform="translate(380,178)"><g class="gap">
<ellipse cx="0" cy="0" rx="38" ry="46" fill="none" stroke="#c0282d" stroke-width="3" stroke-dasharray="7 7"/>
<line x1="0" y1="48" x2="0" y2="74" stroke="#c0282d" stroke-width="3"/>
<path d="M-7,66 L0,76 L7,66" fill="none" stroke="#c0282d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</g></g>

<text class="lbl l1" x="380" y="492" text-anchor="middle">1. Eksik diş</text>
<text class="lbl l2" x="380" y="492" text-anchor="middle">2. İmplant vidası yerleştiriliyor</text>
<text class="lbl l3" x="380" y="492" text-anchor="middle">3. Dayanak (abutment) takılıyor</text>
<text class="lbl l4" x="380" y="492" text-anchor="middle">4. Diş kuronu yerleştiriliyor</text>
<text class="lbl l5" x="380" y="492" text-anchor="middle" fill="#0f6e56">✓ Tedavi tamamlandı</text>

<rect x="60" y="504" width="640" height="6" rx="3" fill="#cfe3ee"/>
<rect class="pbar" x="60" y="504" width="640" height="6" rx="3" fill="#c0282d"/>
</svg>
</div>
</body>
</html>
