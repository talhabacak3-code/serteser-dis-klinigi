<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diş Beyazlatma Animasyonu</title>
<style>
  html,body{margin:0;height:100%;background:transparent;font-family:'Poppins','Segoe UI',sans-serif;}
  .sahne{max-width:760px;margin:0 auto;}
  .tdis{animation:col 13s infinite ease-in-out}
  .gel{animation:gel 13s infinite ease-in-out}
  .light{animation:lit 13s infinite ease-in-out}
  .pointer{transform-box:fill-box;animation:pnt 13s infinite ease-in-out}
  .spark{animation:spk 13s infinite linear}
  .pbar{transform-box:fill-box;transform-origin:left center;animation:pgA 13s infinite linear}
  .l1{animation:l1 13s infinite linear}.l2{animation:l2 13s infinite linear}
  .l3{animation:l3 13s infinite linear}.l4{animation:l4 13s infinite linear}
  @keyframes col{0%,30%{fill:#e6d29a}72%,100%{fill:#fcfdfd}}
  @keyframes gel{0%,22%{opacity:0}30%{opacity:0.6}66%{opacity:0.45}74%,100%{opacity:0}}
  @keyframes lit{0%,42%{opacity:0}46%{opacity:0.85}58%{opacity:0.35}70%{opacity:0.85}73%,100%{opacity:0}}
  @keyframes pnt{0%,30%{transform:translateY(0)}72%,100%{transform:translateY(-90px)}}
  @keyframes spk{0%,74%{opacity:0}80%{opacity:1}88%{opacity:0.3}100%{opacity:1}}
  @keyframes pgA{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
  @keyframes l1{0%,18%{opacity:1}22%,100%{opacity:0}}
  @keyframes l2{0%,20%{opacity:0}24%,40%{opacity:1}44%,100%{opacity:0}}
  @keyframes l3{0%,42%{opacity:0}46%,70%{opacity:1}74%,100%{opacity:0}}
  @keyframes l4{0%,72%{opacity:0}76%,100%{opacity:1}}
  .lbl{font-family:'Poppins','Segoe UI',sans-serif;font-size:18px;font-weight:600;fill:#173043}
  .sw{font-family:'Poppins','Segoe UI',sans-serif;font-size:13px;font-weight:600;fill:#5b6b76}
  @media (prefers-reduced-motion: reduce){
    .tdis,.gel,.light,.pointer,.l1,.l2,.l3,.pbar,.spark{animation:none}
    .tdis{fill:#fcfdfd}.gel,.light{opacity:0}.pointer{transform:translateY(-90px)}
    .l1,.l2,.l3{opacity:0}.l4{animation:none;opacity:1}.spark{opacity:1}
  }
</style>
</head>
<body>
<div class="sahne">
<svg width="100%" viewBox="0 0 760 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Diş beyazlatma animasyonu</title>
<desc>Sararmış bir dişe beyazlatma jeli ve ışık uygulanarak dişin beyazlamasını gösteren animasyon.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef8fd"/><stop offset="1" stop-color="#d8edf7"/></linearGradient>
<radialGradient id="bulge" cx="38%" cy="26%" r="80%"><stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/><stop offset="60%" stop-color="#ffffff" stop-opacity="0.12"/><stop offset="100%" stop-color="#9aa6ad" stop-opacity="0.25"/></radialGradient>
<filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#173043" flood-opacity="0.18"/></filter>
<path id="bigtooth" d="M-60,-150 C-72,-184 -34,-196 0,-196 C34,-196 72,-184 60,-150 C70,-94 56,-36 42,-18 C20,4 -20,4 -42,-18 C-56,-36 -70,-94 -60,-150 Z"/>
</defs>

<rect x="0" y="0" width="760" height="520" rx="20" fill="url(#bg)"/>

<g transform="translate(300,300)" filter="url(#soft)">
<use href="#bigtooth" class="tdis" fill="#e6d29a" stroke="#cbbd84" stroke-width="2.5"/>
<use href="#bigtooth" fill="url(#bulge)"/>
<path d="M-34,-168 C-46,-150 -50,-110 -44,-70" fill="none" stroke="#ffffff" stroke-width="11" opacity="0.6" stroke-linecap="round"/>
<use href="#bigtooth" class="gel" fill="#bfe6cf" opacity="0"/>
</g>

<polygon class="light" points="470,70 520,80 360,250 300,210" fill="#ffe9a3" opacity="0"/>
<g class="light" opacity="0" transform="translate(470,60)">
<rect x="-14" y="-26" width="28" height="34" rx="6" fill="#9aa1a8"/>
<rect x="-9" y="6" width="18" height="10" rx="3" fill="#7d868e"/>
</g>

<g class="spark" fill="#f5a623" opacity="0">
<path d="M150,140 l5,12 l12,5 l-12,5 l-5,12 l-5,-12 l-12,-5 l12,-5 z"/>
<path d="M205,235 l4,9 l9,4 l-9,4 l-4,9 l-4,-9 l-9,-4 l9,-4 z"/>
<path d="M120,250 l3,8 l8,3 l-8,3 l-3,8 l-3,-8 l-8,-3 l8,-3 z"/>
</g>

<text class="sw" x="625" y="120" text-anchor="middle">Ton</text>
<rect x="590" y="130" width="70" height="40" rx="8" fill="#fcfdfd" stroke="#dce4e8"/>
<rect x="590" y="175" width="70" height="40" rx="8" fill="#f3e9c8" stroke="#e3d8b8"/>
<rect x="590" y="220" width="70" height="40" rx="8" fill="#e6d29a" stroke="#d6c084"/>
<text class="sw" x="668" y="155" text-anchor="start">A1</text>
<text class="sw" x="668" y="200" text-anchor="start">A2</text>
<text class="sw" x="668" y="245" text-anchor="start">A3</text>
<g class="pointer" transform="translate(578,240)"><path d="M0,-10 L-16,0 L0,10 Z" fill="#c0282d"/></g>

<text class="lbl l1" x="320" y="492" text-anchor="middle">1. Sararmış diş</text>
<text class="lbl l2" x="320" y="492" text-anchor="middle">2. Beyazlatma jeli uygulanır</text>
<text class="lbl l3" x="320" y="492" text-anchor="middle">3. Işık jeli aktive eder</text>
<text class="lbl l4" x="320" y="492" text-anchor="middle" fill="#0f6e56">✓ Daha beyaz, parlak gülüş</text>

<rect x="60" y="504" width="640" height="6" rx="3" fill="#cfe3ee"/>
<rect class="pbar" x="60" y="504" width="640" height="6" rx="3" fill="#c0282d"/>
</svg>
</div>
</body>
</html>
